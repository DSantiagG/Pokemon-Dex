name: Build and Deploy DocC

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Swift Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Caches/org.swift.swiftpm
            build/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies \
          -scheme "Pokemon Dex" \
          -derivedDataPath build

      - name: Build DocC archive
        run: |
          xcodebuild docbuild \
          -scheme "Pokemon Dex" \
          -destination 'generic/platform=iOS Simulator' \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO

      - name: Find DocC archive
        run: |
          DOCC_ARCHIVE=$(find build -name "*.doccarchive" | head -n 1)
          echo "DOCC_ARCHIVE=$DOCC_ARCHIVE" >> $GITHUB_ENV
          echo "DocC archive found at: $DOCC_ARCHIVE"

      - name: Convert to static site
        run: |
          xcrun docc process-archive transform-for-static-hosting \
          "$DOCC_ARCHIVE" \
          --output-path docs \
          --hosting-base-path Pokemon-Dex

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
